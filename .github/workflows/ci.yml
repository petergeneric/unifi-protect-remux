name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS arm64
          - os: ubuntu-latest
            name: Ubuntu x86_64
          - os: windows-latest
            name: Windows x86_64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install nasm ffmpeg pkg-config
          echo "FFMPEG_DIR=$(brew --prefix ffmpeg)" >> "$GITHUB_ENV"

      - name: Install pre-built FFmpeg (Ubuntu x86_64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libxv-dev libc++-dev nasm
          # Pinned to a dated BtbN autobuild tag (immutable) rather than the
          # rolling "latest" tag, which drops older FFmpeg branch assets when
          # new versions ship (broke CI when 8.1 bumped 8.0 off the latest tag).
          FFMPEG_TAG="autobuild-2026-04-15-13-19"
          FFMPEG_NAME="ffmpeg-n8.1-8-g735c84b57f-linux64-lgpl-shared-8.1"
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_TAG}/${FFMPEG_NAME}.tar.xz" -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          echo "FFMPEG_DIR=${PWD}/${FFMPEG_NAME}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${PWD}/${FFMPEG_NAME}/lib" >> "$GITHUB_ENV"

      - name: Install FFmpeg and LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # LLVM for bindgen
          choco install llvm --yes --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

          # Pre-built FFmpeg 8 shared libs.
          # Pinned to a dated BtbN autobuild tag (immutable) rather than the
          # rolling "latest" tag, which drops older FFmpeg branch assets when
          # new versions ship (broke CI when 8.1 bumped 8.0 off the latest tag).
          # Keep in sync with release-windows.yml.
          $ffmpegTag = "autobuild-2026-04-15-13-19"
          $ffmpegName = "ffmpeg-n8.1-8-g735c84b57f-win64-lgpl-shared-8.1"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/$ffmpegTag/$ffmpegName.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $ffmpegDir = (Resolve-Path $ffmpegName).Path
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Clean cached FFmpeg build artifacts
        shell: bash
        run: cargo clean -p ffmpeg-sys-next 2>/dev/null || true

      - name: Build
        run: cargo build --no-default-features

      - name: Build C# GUI
        if: runner.os != 'Linux'
        run: dotnet build ui/RemuxGui/RemuxGui.csproj -c Debug

      - name: Test
        run: cargo nextest run --no-default-features --profile ci

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests (${{ matrix.name }})
          path: target/nextest/ci/junit.xml
          reporter: java-junit
