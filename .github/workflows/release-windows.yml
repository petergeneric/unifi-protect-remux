name: Release (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach assets to (leave empty for build-only test)"
        required: false

permissions:
  contents: write
  checks: write

jobs:
  build:
    name: windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install FFmpeg and LLVM
        shell: pwsh
        run: |
          # LLVM for bindgen
          choco install llvm --yes --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

          # Pre-built FFmpeg 8 shared libs
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.0-latest-win64-lgpl-shared-8.0.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $ffmpegDir = (Resolve-Path "ffmpeg-n8.0-latest-win64-lgpl-shared-8.0").Path
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      - name: Download VC++ redistributable
        shell: pwsh
        run: |
          # Bundle Microsoft's VC++ 2015-2022 Redistributable bootstrapper so
          # end users don't need it pre-installed. The NSIS installer runs it
          # silently during install; CLI-zip users can run it manually once.
          # Retry on download failure.
          $url = "https://aka.ms/vc14/vc_redist.x64.exe"
          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile vc_redist.x64.exe -UseBasicParsing
              break
            } catch {
              if ($attempt -eq $maxAttempts) { throw }
              Write-Host "Download attempt $attempt failed: $_ - retrying in $($attempt * 5)s..."
              Start-Sleep -Seconds ($attempt * 5)
            }
          }
          $VCRedistPath = (Resolve-Path vc_redist.x64.exe).Path
          echo "VC_REDIST=$VCRedistPath" >> $env:GITHUB_ENV

      - name: Verify VC++ redistributable Authenticode signature
        shell: pwsh
        run: |
          # Validate the exe signature. We match on the signer
          # organization (O=Microsoft Corporation) in both Subject and Issuer
          # rather than pinning a thumbprint, because Microsoft rotated their
          # code-signing PCAs in 2025 and will rotate them again. Organization
          # matching chains to Microsoft's roots regardless of PCA version.
          $sig = Get-AuthenticodeSignature vc_redist.x64.exe
          if ($sig.Status -ne 'Valid') {
            throw "Authenticode signature status is '$($sig.Status)': $($sig.StatusMessage)"
          }
          if ($sig.SignerCertificate.Subject -notmatch 'O=Microsoft Corporation') {
            throw "Unexpected signer subject: $($sig.SignerCertificate.Subject)"
          }
          if ($sig.SignerCertificate.Issuer -notmatch 'O=Microsoft Corporation') {
            throw "Unexpected signer issuer: $($sig.SignerCertificate.Issuer)"
          }
          Write-Host "Authenticode signature verified."
          Write-Host "  Subject:    $($sig.SignerCertificate.Subject)"
          Write-Host "  Issuer:     $($sig.SignerCertificate.Issuer)"
          Write-Host "  Thumbprint: $($sig.SignerCertificate.Thumbprint)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-x86_64-pc-windows-msvc-

      - name: Build release binaries
        run: cargo build --release --no-default-features --target x86_64-pc-windows-msvc

      - name: Build C# GUI
        shell: pwsh
        run: |
          $NativeDir = "ui/RemuxGui/native/win-x64"
          New-Item -ItemType Directory -Force $NativeDir
          Copy-Item "target/x86_64-pc-windows-msvc/release/remux_ffi.dll" $NativeDir
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" $NativeDir
          dotnet publish ui/RemuxGui/RemuxGui.csproj -c Release -r win-x64 --self-contained -o publish/win-x64

      - name: Test
        run: cargo nextest run --release --no-default-features --target x86_64-pc-windows-msvc --profile ci

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests (cli-windows-x86_64)
          path: target/nextest/ci/junit.xml
          reporter: java-junit

      - name: Stage CLI binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging
          Copy-Item target/x86_64-pc-windows-msvc/release/remux.exe staging/
          Copy-Item target/x86_64-pc-windows-msvc/release/ubv-info.exe staging/
          Copy-Item target/x86_64-pc-windows-msvc/release/ubv-anonymise.exe staging/
          # Bundle FFmpeg DLLs so users don't need a separate FFmpeg install
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" staging/
          # Bundle VC++ 2015-2022 Redistributable bootstrapper
          Copy-Item "$env:VC_REDIST" staging/
          # README with first-time setup instructions
          Copy-Item ui/installer/cli-readme.txt staging/README.txt

      - name: Upload artifact (CLI)
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x86_64
          path: staging/

      - name: Stage GUI and build installer
        shell: pwsh
        run: |
          # Add GUI to staging for the NSIS installer
          New-Item -ItemType Directory -Force staging/RemuxGui
          Copy-Item -Recurse publish/win-x64/* staging/RemuxGui/

          choco install nsis --yes --no-progress
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          Expand-Archive ui\installer\nsis-plugins\EnVar_plugin.zip -DestinationPath $nsisDir
          $version = if ("${{ github.event.release.tag_name }}" -ne "") { "${{ github.event.release.tag_name }}" } else { "${{ github.ref_name }}" }
          # Derive numeric X.X.X.0 version for PE metadata, fallback to 0.0.0.0
          if ($version -match '^v?(\d+)\.(\d+)\.(\d+)(?:-(\d+))?') { $viVersion = "$($Matches[1]).$($Matches[2]).$($Matches[3]).$($Matches[4] ?? '0')" } else { $viVersion = "0.0.0.0" }
          $stagingDir = (Resolve-Path staging).Path
          & "$nsisDir\makensis.exe" /DSTAGING_DIR=$stagingDir /DVERSION=$version /DVI_VERSION=$viVersion ui\installer\windows.nsi
          Move-Item ui\installer\cli-windows-x86_64-setup.exe gui-unsigned-windows-x86_64.exe

      - name: Upload artifact (GUI installer)
        uses: actions/upload-artifact@v4
        with:
          name: gui-unsigned-windows-x86_64
          path: gui-unsigned-windows-x86_64.exe

      - name: Determine release tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        if: steps.tag.outputs.tag != ''
        shell: pwsh
        # Explicit path list (not staging/*) because by this point the earlier
        # "Stage GUI and build installer" step has added staging/RemuxGui/ for
        # the NSIS installer, and that must NOT end up in the CLI zip.
        run: Compress-Archive -Path staging/remux.exe,staging/ubv-info.exe,staging/ubv-anonymise.exe,staging/*.dll,staging/vc_redist.x64.exe,staging/README.txt -DestinationPath cli-windows-x86_64.zip

      - name: Upload release asset (zip)
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ steps.tag.outputs.tag }}" cli-windows-x86_64.zip

      - name: Upload release asset (GUI installer)
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ steps.tag.outputs.tag }}" gui-unsigned-windows-x86_64.exe
